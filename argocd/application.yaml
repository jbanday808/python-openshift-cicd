apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: python-openshift-cicd
  namespace: openshift-gitops
spec:
  project: default
  source:
    repoURL: https://github.com/jbanday808/python-openshift-cicd.git
    targetRevision: main
    path: manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: jbanday100-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
